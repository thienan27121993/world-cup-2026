<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#080e26">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon.svg">
<title>World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
/* ── DARK GLASS THEME (MSN Weather-inspired) ─── */
:root {
  --card:   rgba(255,255,255,0.09);
  --card2:  rgba(255,255,255,0.055);
  --line:   rgba(255,255,255,0.10);
  --line2:  rgba(255,255,255,0.16);
  --shadow: 0 8px 32px rgba(0,5,30,0.40), inset 0 1px 0 rgba(255,255,255,0.10);

  --txt:    #eef2ff;
  --muted:  rgba(170,195,255,0.70);
  --dim:    rgba(120,150,220,0.48);

  --gold:     #ffd060;
  --gold-bg:  rgba(255,208,96,0.14);
  --jp:       #ff8fa3;
  --jp-bg:    rgba(255,143,163,0.14);
  --knock:    #82c0ff;
  --knock-bg: rgba(130,192,255,0.13);
  --live:     #ff5263;
  --live-bg:  rgba(255,82,99,0.18);
  --safe:     #40e68a;
  --safe-bg:  rgba(64,230,138,0.13);
  --feat:     #ffd060;
  --feat-bg:  rgba(255,208,96,0.12);

  --nav-h: 62px;
  --r: 16px;
  --accent: #82c0ff;
}

*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  background: #080e26;
  background-image: linear-gradient(160deg, #080e26 0%, #0c1a42 35%, #112054 70%, #0a142e 100%);
  background-attachment: fixed;
  color: var(--txt);
  font-family: 'Zen Kaku Gothic New', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 8px);
  min-height: 100vh;
}

/* ── HEADER ─────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 40;
  background: rgba(8,14,38,0.82);
  border-bottom: 1px solid rgba(255,255,255,0.09);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  padding: max(14px, env(safe-area-inset-top)) 16px 10px;
  max-width: 540px; margin: 0 auto;
}
.hrow { display: flex; align-items: center; gap: 10px; }
.logo {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, #3a7bd5 0%, #1a3a8e 100%);
  display: grid; place-items: center; flex: 0 0 auto;
  box-shadow: 0 2px 10px rgba(58,123,213,0.45);
}
.logo span { font-family: 'Fraunces', serif; font-weight: 700; font-size: 14px; color: #ffd060; }
.brand-name { font-family: 'Fraunces', serif; font-weight: 700; font-size: 18px; line-height: 1.1; color: var(--txt); }
.brand-sub { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }
.ldot { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); white-space: nowrap; }
.ldot-i { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); transition: background .3s; flex: 0 0 auto; }
.ldot.on .ldot-i { background: var(--safe); animation: pulse 2s infinite; }
.ldot.on { color: var(--safe); font-weight: 700; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(64,230,138,.5)} 55%{box-shadow:0 0 0 6px rgba(64,230,138,0)} }

/* ── HERO ────────────────────────────────────── */
#heroSlot { margin-top: 10px; }
.hero {
  border-radius: var(--r);
  background: linear-gradient(135deg, rgba(26,74,140,0.80) 0%, rgba(10,28,80,0.88) 100%);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  color: #eef2ff;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,5,30,0.45), inset 0 1px 0 rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.14);
}
.hero.jp    { background: linear-gradient(135deg, rgba(100,20,45,0.82) 0%, rgba(10,28,80,0.88) 100%); }
.hero.liveh { background: linear-gradient(135deg, rgba(140,20,30,0.82) 0%, rgba(10,28,80,0.88) 100%); }
.hero-top {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 15px 9px;
  font-size: 10.5px; letter-spacing: 1.5px; text-transform: uppercase;
  color: rgba(200,220,255,.62);
  border-bottom: 1px solid rgba(255,255,255,.10);
}
.live-badge {
  background: var(--live); color: #fff;
  padding: 2px 8px; border-radius: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: .5px;
  animation: livefade 1.4s ease-in-out infinite alternate;
}
@keyframes livefade { from{opacity:1} to{opacity:.7} }
.hero-body { padding: 14px 16px 12px; }
.hero-teams { display: grid; grid-template-columns: 1fr 86px 1fr; align-items: center; gap: 4px; }
.hteam { text-align: center; }
.hteam .hfl { font-size: 38px; line-height: 1; display: block; }
.hteam .hnm { font-size: 13px; font-weight: 700; margin-top: 5px; color: #eef2ff; }
.hmid { text-align: center; }
.hmid .hsc { font-family: 'DM Mono', monospace; font-size: 34px; font-weight: 500; color: var(--gold); display: block; line-height: 1; }
.hmid .hvs { font-size: 20px; color: rgba(200,220,255,.42); font-weight: 700; }
.hero-foot { padding: 0 16px 13px; font-size: 11.5px; color: rgba(170,200,255,.62); }
.cd-row { display: flex; gap: 8px; margin-top: 12px; }
.cd-box { flex: 1; background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.14); border-radius: 10px; padding: 8px 4px; text-align: center; }
.cd-box b { display: block; font-family: 'DM Mono', monospace; font-size: 22px; color: #fff; line-height: 1; }
.cd-box small { font-size: 9px; letter-spacing: 1.2px; color: rgba(180,210,255,.52); text-transform: uppercase; }

/* ── WRAP ─────────────────────────────────────── */
.wrap { max-width: 540px; margin: 0 auto; padding: 0 14px 4px; }

/* ── DATE HEADER ──────────────────────────────── */
.day-hd { display: flex; align-items: center; gap: 8px; margin: 18px 2px 9px; }
.day-hd b { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 700; color: var(--txt); }
.today-chip { background: rgba(130,192,255,0.16); color: var(--knock); font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 5px; letter-spacing: 1px; border: 1px solid rgba(130,192,255,.25); }

/* ── MATCH CARD ──────────────────────────────── */
.mc {
  background: var(--card);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: var(--r); margin-bottom: 9px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--line);
}
.mc.jp      { border-color: rgba(255,143,163,.25); border-left: 3px solid var(--jp); }
.mc.feat    { border-left: 3px solid var(--gold); }
.mc.knock   { border-left: 3px solid var(--knock); }
.mc.livegame{ border-color: rgba(255,82,99,.30); border-left: 3px solid var(--live); }
.mc.done    { opacity: .42; }

.mc-top { display: flex; align-items: center; gap: 6px; padding: 7px 13px 6px; background: var(--card2); border-bottom: 1px solid var(--line); }
.badge { font-size: 9.5px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: .3px; white-space: nowrap; display: inline-flex; align-items: center; gap: 3px; }
.bl { background: var(--live);     color: #fff; }
.bj { background: var(--jp-bg);   color: var(--jp); border: 1px solid rgba(255,143,163,.25); }
.bf { background: var(--feat-bg); color: var(--feat); border: 1px solid rgba(255,208,96,.22); }
.bk { background: var(--knock-bg);color: var(--knock); border: 1px solid rgba(130,192,255,.22); }
.bg { background: rgba(255,255,255,.07); color: var(--muted); border: 1px solid var(--line); }
.mc-top-r { margin-left: auto; font-size: 10.5px; color: var(--muted); }

.mc-body { padding: 12px 14px 10px; }
.mc-teams { display: grid; grid-template-columns: 1fr 80px 1fr; align-items: center; gap: 4px; }
.mct { text-align: center; }
.mct .tf { font-size: 32px; line-height: 1; display: block; }
.mct .tn { font-size: 12.5px; font-weight: 700; margin-top: 4px; color: var(--txt); line-height: 1.25; }
.mcmid { text-align: center; }
.mcmid .sc { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: var(--gold); display: block; line-height: 1; }
.mcmid .kt { font-family: 'DM Mono', monospace; font-size: 20px; color: var(--txt); display: block; line-height: 1; }
.mcmid .ku { font-size: 9px; color: var(--muted); letter-spacing: 1.2px; display: block; margin-top: 2px; }
.mcmid .vs { font-size: 15px; color: var(--dim); font-weight: 700; }

.mc-foot { display: flex; align-items: center; padding: 8px 13px 10px; border-top: 1px solid var(--line); gap: 8px; background: transparent; }
.mc-city { font-size: 11px; color: var(--muted); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mc-actions { display: flex; gap: 5px; flex: 0 0 auto; }
.ibtn { width: 34px; height: 32px; border-radius: 8px; border: 1px solid var(--line2); background: var(--card2); color: var(--muted); display: grid; place-items: center; cursor: pointer; font-size: 14px; transition: .15s; }
.ibtn.on { background: rgba(255,208,96,.14); color: var(--gold); border-color: rgba(255,208,96,.30); }
.wbtn { height: 32px; padding: 0 12px; border-radius: 8px; border: 1px solid rgba(130,192,255,.30); background: rgba(130,192,255,.12); color: var(--knock); cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: .5px; white-space: nowrap; transition: .15s; }
.wbtn:hover { background: rgba(130,192,255,.22); }

/* ── FILTER BAR ───────────────────────────────── */
.filterbar { display: flex; gap: 7px; align-items: center; margin: 10px 0 4px; flex-wrap: wrap; }
.filterbar select { flex: 1; min-width: 130px; background: var(--card); color: var(--txt); border: 1px solid var(--line2); border-radius: 10px; padding: 9px 11px; font-family: inherit; font-size: 13px; }
.filterbar select option { background: #0c1638; color: var(--txt); }
.chip { font-size: 11.5px; padding: 7px 13px; border-radius: 999px; border: 1px solid var(--line2); background: var(--card); color: var(--muted); cursor: pointer; font-weight: 700; font-family: inherit; transition: .15s; box-shadow: var(--shadow); }
.chip.on-jp   { background: var(--jp-bg);   color: var(--jp);    border-color: rgba(255,143,163,.30); }
.chip.on-feat { background: var(--feat-bg); color: var(--feat);  border-color: rgba(255,208,96,.30); }
.legend { display: flex; gap: 13px; flex-wrap: wrap; font-size: 11px; color: var(--muted); margin: 8px 2px 4px; }
.legend i { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }

/* ── STANDINGS ────────────────────────────────── */
.grp-card { background: var(--card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: var(--r); margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--line); }
.grp-head { display: flex; align-items: center; gap: 9px; padding: 11px 14px; background: rgba(26,74,140,0.50); border-bottom: 1px solid rgba(255,255,255,0.10); }
.grp-head h4 { margin: 0; font-family: 'Fraunces', serif; font-size: 14px; font-weight: 700; color: #eef2ff; }
.glbl { background: rgba(255,208,96,.15); color: var(--gold); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 5px; font-family: 'DM Mono', monospace; border: 1px solid rgba(255,208,96,.28); }
table { width: 100%; border-collapse: collapse; }
th { font-size: 9px; color: var(--muted); font-weight: 700; text-align: center; padding: 8px 4px; letter-spacing: .7px; text-transform: uppercase; background: var(--card2); border-bottom: 1px solid var(--line2); }
th:first-child, td:first-child { text-align: left; padding-left: 14px; }
th:last-child,  td:last-child  { padding-right: 14px; }
td { padding: 10px 4px; text-align: center; border-top: 1px solid var(--line); font-size: 13px; color: var(--txt); }
td.tm { font-weight: 600; }
td.tm .fl { margin-right: 5px; }
tr.jp-row td { color: var(--jp); font-weight: 700; }
tr.qual { background: rgba(64,230,138,.05); }
tr.qual td:first-child { border-left: 3px solid var(--safe); }
td.pts { font-family: 'DM Mono', monospace; font-weight: 700; color: var(--gold); font-size: 14px; }

/* ── SETTINGS ─────────────────────────────────── */
.scard { background: var(--card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: var(--r); margin-top: 14px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--line); }
.scard h3 { margin: 0; font-family: 'Fraunces', serif; font-size: 15px; font-weight: 700; padding: 12px 15px; background: var(--card2); border-bottom: 1px solid var(--line2); color: var(--txt); }
.srow { display: flex; align-items: center; gap: 12px; padding: 13px 15px; border-bottom: 1px solid var(--line); }
.srow:last-child { border-bottom: none; }
.slab { font-size: 13.5px; font-weight: 600; flex: 1; color: var(--txt); }
.sdesc { font-size: 11.5px; color: var(--muted); margin-top: 2px; font-weight: 400; }
.toggle { width: 46px; height: 27px; border-radius: 999px; background: rgba(255,255,255,.20); border: none; position: relative; cursor: pointer; flex: 0 0 auto; transition: .2s; }
.toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 21px; height: 21px; border-radius: 50%; background: #fff; transition: .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
.toggle.on { background: var(--safe); }
.toggle.on::after { left: 22px; }
select.mini, input.mini { background: rgba(255,255,255,.08); color: var(--txt); border: 1px solid var(--line2); border-radius: 8px; padding: 8px 10px; font-family: inherit; font-size: 13px; }
select.mini option { background: #0c1638; color: var(--txt); }
input.mini { width: 100%; }
input.mini::placeholder { color: var(--dim); }
.scol { flex-direction: column; align-items: stretch; gap: 8px; }
.scol .slab { font-size: 13px; }
.sbtn { display: block; width: calc(100% - 30px); margin: 12px 15px; text-align: center; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 14px; }
.sbtn-primary { background: linear-gradient(135deg, #3a7bd5 0%, #1a4aad 100%); color: var(--gold); box-shadow: 0 4px 16px rgba(58,123,213,.35); }
.sbtn-ghost { background: var(--card2); color: var(--muted); border: 1px solid var(--line2); }
.snote { font-size: 11.5px; color: var(--muted); line-height: 1.7; padding: 10px 15px; }
.snote code { font-family: 'DM Mono'; background: rgba(255,255,255,.08); padding: 1px 5px; border-radius: 4px; color: var(--gold); font-size: 11px; border: 1px solid var(--line2); }
.sstep { background: var(--card2); border-radius: 10px; padding: 12px 14px; margin: 0 15px 10px; border: 1px solid var(--line); }
.sstep p { margin: 0 0 6px; font-size: 12.5px; font-weight: 700; color: var(--txt); }
.sstep ol { margin: 0; padding-left: 18px; font-size: 12px; color: var(--muted); line-height: 2.1; }
.sstep a { color: var(--knock); font-weight: 600; }
.status-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 99px; font-size: 12px; font-weight: 700; }
.pill-ok  { background: var(--safe-bg); color: var(--safe); border: 1px solid rgba(64,230,138,.25); }
.pill-err { background: var(--live-bg); color: var(--live); border: 1px solid rgba(255,82,99,.25); }
.pill-off { background: rgba(255,255,255,.06); color: var(--muted); border: 1px solid var(--line2); }

/* ── BOTTOM NAV ──────────────────────────────── */
.bnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: rgba(8,14,38,0.88);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid rgba(255,255,255,0.10);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: 0 -4px 28px rgba(0,5,30,0.55);
}
.nbtn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; height: var(--nav-h); cursor: pointer; border: none; background: transparent;
  color: var(--muted); font-family: inherit; transition: color .15s;
}
.nbtn .ni { font-size: 20px; line-height: 1; transition: transform .2s; }
.nbtn .nl { font-size: 10px; font-weight: 700; letter-spacing: .3px; }
.nbtn.active { color: var(--accent); }
.nbtn.active .ni { transform: scale(1.1) translateY(-1px); }

/* ── WATCH SHEET ──────────────────────────────── */
.sheet-bg { position: fixed; inset: 0; z-index: 60; background: rgba(0,5,30,0.60); display: none; align-items: flex-end; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
.sheet-bg.show { display: flex; }
.sheet { background: rgba(10,18,54,0.96); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); width: 100%; max-width: 540px; margin: 0 auto; border-radius: 24px 24px 0 0; padding: 16px 16px max(20px,env(safe-area-inset-bottom)); box-shadow: 0 -8px 40px rgba(0,5,30,0.60); border-top: 1px solid rgba(255,255,255,0.12); }
.sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: rgba(255,255,255,.22); margin: 0 auto 14px; }
.sheet h4 { margin: 0 0 3px; font-family: 'Fraunces', serif; font-weight: 700; font-size: 17px; color: var(--txt); }
.sheet .sm { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
.wlink { display: flex; align-items: center; gap: 12px; padding: 13px 14px; border-radius: 12px; background: var(--card); border: 1px solid var(--line); margin-bottom: 8px; text-decoration: none; color: var(--txt); }
.wlink .ic { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center; font-weight: 700; font-size: 12px; flex: 0 0 auto; font-family: 'DM Mono'; }
.wlink b { font-size: 13.5px; font-weight: 700; }
.wlink small { display: block; font-size: 11px; color: var(--muted); margin-top: 1px; }
.wfree { margin-left: auto; background: var(--safe-bg); color: var(--safe); font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 5px; border: 1px solid rgba(64,230,138,.25); white-space: nowrap; }
.lang-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.lang-tab { flex: 1; padding: 7px 4px; border: 1.5px solid var(--line2); border-radius: 9px; background: var(--card2); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; transition: .15s; }
.lang-tab.active { border-color: var(--accent); background: rgba(130,192,255,0.15); color: var(--accent); }

/* ── MISC ─────────────────────────────────────── */
.empty { text-align: center; color: var(--muted); padding: 40px 10px; font-size: 13px; }
.toast { position: fixed; left: 50%; bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 12px); transform: translateX(-50%) translateY(80px); background: rgba(10,18,54,0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); color: #eef2ff; padding: 10px 18px; border-radius: 11px; font-size: 13px; z-index: 80; transition: .3s; max-width: 88%; text-align: center; box-shadow: 0 4px 24px rgba(0,5,30,.5); border: 1px solid rgba(255,255,255,.12); }
.toast.show { transform: translateX(-50%) translateY(0); }
.sec-note { font-size: 12px; color: var(--muted); margin: 8px 2px 14px; line-height: 1.65; }
</style>
</head>
<body>

<header>
  <div class="hrow">
    <div class="logo"><span>26</span></div>
    <div>
      <div class="brand-name">World Cup 2026</div>
      <div class="brand-sub">Canada · Mexico · USA — JST</div>
    </div>
    <div class="ldot" id="liveDot"><div class="ldot-i"></div><span id="liveTxt">日程表示</span></div>
  </div>
  <div id="heroSlot"></div>
</header>

<main class="wrap" id="view"></main>

<nav class="bnav">
  <button class="nbtn active" data-tab="today"><span class="ni">🏠</span><span class="nl" id="nlToday">今日</span></button>
  <button class="nbtn" data-tab="all"><span class="ni">📅</span><span class="nl" id="nlAll">日程</span></button>
  <button class="nbtn" data-tab="table"><span class="ni">📊</span><span class="nl" id="nlTable">順位</span></button>
  <button class="nbtn" data-tab="set"><span class="ni">⚙️</span><span class="nl" id="nlSet">設定</span></button>
</nav>

<div class="sheet-bg" id="watchSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h4 id="wsTitle"></h4>
    <div class="sm" id="wsSub"></div>
    <div class="lang-tabs">
      <button class="lang-tab" id="ltVN" onclick="setLangTab('vn')">🇻🇳 Việt Nam</button>
      <button class="lang-tab" id="ltJP" onclick="setLangTab('jp')">🇯🇵 日本語</button>

const now=()=>new Date();
const dt=m=>new Date(m.iso);
const dayKey=m=>{const d=dt(m);return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();};

  const u=UI[langMode]||UI.jp;

  return`${d.getDate()}/${d.getMonth()+1}(${u.wd[d.getDay()]})`;
};
function fmtTime(m){if(m.tbd)return t("tbd");const d=dt(m);return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function res(m){return RESULTS[m.id]||null;}
function status(m){const r=res(m);if(r&&r.status)return r.status;const s=dt(m).getTime(),n=now().getTime();if(n<s)return"NS";if(n<s+2.2*3600*1e3)return"LIVE";return"FT";}
function grpLabel(g){
  const map={R32:t("r32"),R16:t("r16"),QF:t("qf"),SF:t("sf"),"3位":t("third"),"決勝":t("final")};

}

function fmtLastSync(){

}

/* ===================== 順位表計算 ===================== */
function standings(){
  const groups={};
  MATCHES.filter(m=>!m.knock).forEach(m=>{
    const g=m.grp;groups[g]=groups[g]||{};
    [m.h,m.a].forEach(t=>groups[g][t]=groups[g][t]||{t,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});
    const r=res(m);if(r&&r.status==="FT"&&r.sh!=null&&r.sa!=null){
      const H=groups[g][m.h],A=groups[g][m.a];
      H.p++;A.p++;H.gf+=r.sh;H.ga+=r.sa;A.gf+=r.sa;A.ga+=r.sh;
      if(r.sh>r.sa){H.w++;A.l++;H.pts+=3;}else if(r.sh<r.sa){A.w++;H.l++;A.pts+=3;}else{H.d++;A.d++;H.pts++;A.pts++;}
    }
  });
  const out={};
  Object.keys(groups).sort().forEach(g=>{
    out[g]=Object.values(groups[g]).map(x=>({...x,gd:x.gf-x.ga}))
      .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.t.localeCompare(b.t,'ja'));
  });
  return out;
}

      if(fut){base=pickDayWindow(dt(fut));list=MATCHES.filter(m=>{const d=dt(m);return d>=base.s&&d<base.e;}).sort((a,b)=>dt(a)-dt(b));}
    }
  }

    html+=`<div class="filterbar">

  }
  if(!list.length){view.innerHTML=html+`<div class="empty">${t("noMatch")}</div>`;return bind();}

function pickDayWindow(ref){const s=new Date(ref);s.setHours(0,0,0,0);const e=new Date(s);e.setDate(e.getDate()+1);e.setHours(12,0,0,0);return{s,e};}

function card(m){
  const st=status(m),r=res(m),on=notifSet.has(m.id);
  const cls=["mc"];
  if(st==="LIVE"&&!m.knock)cls.push("livegame");
  else if(m.jp)cls.push("jp");
  else if(m.knock)cls.push("knock");
  else if(m.feat)cls.push("feat");
  if(st==="FT")cls.push("done");
  const badges=[];
  if(st==="LIVE")badges.push(`<span class="badge bl">● ${t("live")}${r&&r.minute?` ${r.minute}'`:""}</span>`);
  if(m.jp)badges.push(`<span class="badge bj">${t("jpBadge")}</span>`);
  else if(m.feat)badges.push(`<span class="badge bf">${t("featBadge")}</span>`);
  if(m.knock)badges.push(`<span class="badge bk">${grpLabel(m.grp)}</span>`);
  else badges.push(`<span class="badge bg">${t("grp")} ${m.grp}</span>`);
  let midHTML;
  if(r&&r.sh!=null&&(st==="LIVE"||st==="FT")){
    midHTML=`<span class="sc">${r.sh} – ${r.sa}</span>`;
  } else if(m.tbd){
    midHTML=`<span class="vs">${t("tbd")}</span>`;
  } else {
    midHTML=`<span class="kt">${fmtTime(m)}</span><span class="ku">JST</span>`;
  }
  const topRight=st==="FT"?`<span style="font-size:10.5px;color:var(--muted)">${t("ft")}</span>`:

      <div class="mcmid">${midHTML}</div>

      <button class="ibtn ${on?"on":""}" onclick="toggleNotif(${m.id})">${on?"🔔":"🔕"}</button>
      <button class="wbtn" onclick="openWatch(${m.id})">${t("watch")}</button>

</div>`;
}

/* ── ヒーロー ─────────────────────────────────── */
let cdTimer=null;
function renderHero(){
  const now_=now();
  const liveM=MATCHES.filter(m=>!m.knock&&status(m)==="LIVE").sort((a,b)=>(b.jp-a.jp)||(dt(a)-dt(b)))[0];
  const jpNext=MATCHES.filter(m=>m.jp&&dt(m)>=now_).sort((a,b)=>dt(a)-dt(b))[0];
  const anyNext=MATCHES.filter(m=>dt(m)>=now_&&!m.tbd).sort((a,b)=>dt(a)-dt(b))[0];
  const m=liveM||jpNext||anyNext;
  if(!m){heroSlot.innerHTML="";return;}
  const live=!!(liveM&&m===liveM),r=res(m);
  const hcls="hero"+(m.jp?" jp":"")+(live?" liveh":"");
  const scoreHTML=live&&r&&r.sh!=null
    ?`<span class="hsc">${r.sh} – ${r.sa}</span>`
    :`<span class="hvs">VS</span>`;
  heroSlot.innerHTML=`<div class="${hcls}">
  <div class="hero-top">
    ${live?`<span class="live-badge">● ${t("live")}${r&&r.minute?` ${r.minute}'`:""}</span>`:(m.jp?t("heroJPNext"):t("heroNext"))}
    <span>・ ${grpLabel(m.grp)}</span>
  </div>
  <div class="hero-body">
    <div class="hero-teams">
      <div class="hteam"><span class="hfl">${m.fh}</span><div class="hnm">${tn(m.h)}</div></div>
      <div class="hmid">${scoreHTML}</div>
      <div class="hteam"><span class="hfl">${m.fa}</span><div class="hnm">${tn(m.a)}</div></div>
    </div>
  </div>
  <div class="hero-foot">📍 ${m.city}　${dLabelFull(dt(m))} ${live?t("heroLive"):fmtTime(m)+" "+t("heroKO")}
    ${live?"":`<div class="cd-row" id="cd"></div>`}
  </div>
</div>`;
  if(!live)tickCountdown(m);
}

function tickCountdown(m){
  if(cdTimer)clearInterval(cdTimer);
  const upd=()=>{
    const box=document.getElementById("cd");if(!box)return clearInterval(cdTimer);
    let diff=Math.max(0,dt(m).getTime()-now().getTime());
    const D=Math.floor(diff/864e5);diff-=D*864e5;
    const H=Math.floor(diff/36e5);diff-=H*36e5;
    const Mi=Math.floor(diff/6e4);diff-=Mi*6e4;
    const S=Math.floor(diff/1e3);
    box.innerHTML=[["日",D],["時間",H],["分",Mi],["秒",S]].map(([l,v])=>`<div class="cd-box"><b>${String(v).padStart(2,"0")}</b><small>${l}</small></div>`).join("");
  };upd();cdTimer=setInterval(upd,1000);
}

/* ===================== 通知 ===================== */
async function ensurePerm(){
  if(!("Notification"in window)){toast("この端末は通知に未対応です");return false;}
  if(Notification.permission==="granted")return true;
  if(Notification.permission==="denied"){toast("通知がブロックされています");return false;}
  return(await Notification.requestPermission())==="granted";
}
async function clearScheduled(){
  Object.values(timers).forEach(clearTimeout);timers={};
  if(swReg){try{const ns=await swReg.getNotifications({includeTriggered:true});ns.forEach(n=>{if(n.tag&&n.tag.startsWith("wc26-"))n.close();});}catch(_){}}
}
async function scheduleAll(){
  await clearScheduled();if(!opts.enabled)return;
  const trig=swReg&&("showTrigger"in Notification.prototype);
  const lead=opts.lead*6e4;
  for(const id of notifSet){
    const m=byId(id);if(!m||m.tbd)continue;
    const when=dt(m).getTime()-lead;if(when<=Date.now())continue;
    const title=`${m.fh}${m.h} vs ${m.fa}${m.a}`;
    const body=`まもなくキックオフ ${fmtTime(m)} JST ・ ${m.city}`;
    if(trig){try{await swReg.showNotification(title,{body,tag:"wc26-"+id,icon:"./icon.svg",badge:"./icon.svg",showTrigger:new TimestampTrigger(when)});}catch(_){}}
    else{const delay=when-Date.now();if(delay<2147483647)timers[id]=setTimeout(()=>{if(Notification.permission==="granted")new Notification(title,{body,tag:"wc26-"+id});},delay);}
  }
}
async function toggleNotif(id){
  const m=byId(id);
  if(notifSet.has(id)){notifSet.delete(id);toast(t("toastNotifOff"));}
  else{if(!(await ensurePerm()))return;notifSet.add(id);opts.enabled=true;toast(t("toastNotifOn").replace("{team}",tn(m.h)));}
  save();await scheduleAll();render();
}
function applyAuto(){
  if(opts.jpAuto)MATCHES.filter(m=>m.jp).forEach(m=>notifSet.add(m.id));
  if(opts.featAuto)MATCHES.filter(m=>m.feat&&!m.tbd).forEach(m=>notifSet.add(m.id));
  save();
}

    <div><b>${s.n}</b><small>${s.d}</small></div>${s.free?`<span class="wfree">${badge}</span>`:""}</a>`).join("");

function openWatch(id){

/* ===================== バインド ===================== */
function bind(){
  const ts=document.getElementById("teamSel");if(ts)ts.onchange=e=>{favTeam=e.target.value;save();render();};
  const cj=document.getElementById("cJP");if(cj)cj.onclick=()=>{onlyJP=!onlyJP;onlyFeat=false;render();};
  const cf=document.getElementById("cFeat");if(cf)cf.onclick=()=>{onlyFeat=!onlyFeat;onlyJP=false;render();};
}
function bindSettings(){
  document.getElementById("tgEn").onclick=async()=>{if(!opts.enabled&&!(await ensurePerm()))return;opts.enabled=!opts.enabled;save();await scheduleAll();renderSettings();toast(opts.enabled?t("toastOn"):t("toastOff"));};
  document.getElementById("lead").onchange=e=>{opts.lead=+e.target.value;save();scheduleAll();};
  document.getElementById("tgJP").onclick=()=>{opts.jpAuto=!opts.jpAuto;if(opts.jpAuto)applyAuto();save();scheduleAll();renderSettings();};
  document.getElementById("tgFt").onclick=()=>{opts.featAuto=!opts.featAuto;if(opts.featAuto)applyAuto();save();scheduleAll();renderSettings();};
  document.getElementById("tgDemo").onclick=async()=>{opts.demo=!opts.demo;save();await syncLive();renderSettings();render();};
  document.getElementById("saveApi").onclick=async()=>{
    opts.fdKey=document.getElementById("fdKey").value.trim();
    opts.apiBase=document.getElementById("apiBase").value.trim();
    save();await syncLive();renderSettings();render();
    toast(liveOK?t("toastSynced"):keyMissing?t("toastNoKey"):t("toastNoConn"));
  };
  document.getElementById("fav").onchange=e=>{favTeam=e.target.value;save();};
  document.getElementById("testN").onclick=async()=>{
    if(!(await ensurePerm()))return;
    if(swReg)swReg.showNotification("⚽ World Cup 2026",{body:t("setTestNotif"),icon:"./icon.svg"});
    else new Notification("⚽ World Cup 2026",{body:t("setTestNotif")});
    toast(t("toastTest"));
  };
}

/* ===================== ナビ ===================== */
document.querySelectorAll(".nbtn").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".nbtn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");current=b.dataset.tab;onlyJP=onlyFeat=false;

/* ===================== トースト ===================== */
let tT=null;
function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(tT);tT=setTimeout(()=>el.classList.remove("show"),2800);}

/* ===================== 起動 ===================== */
async function init(){
  if("serviceWorker"in navigator&&location.protocol!=="file:"){
    try{swReg=await navigator.serviceWorker.register("./sw.js");await navigator.serviceWorker.ready;}catch(_){}
  }
  updateNavLang();
  if(opts.jpAuto||opts.featAuto)applyAuto();
  await syncLive();
  if(opts.enabled&&("Notification"in window)&&Notification.permission==="granted")await scheduleAll();
  render();
  setInterval(async()=>{await syncLive();renderHero();if(current!=="set"&&current!=="table")render();if(current==="table"){renderHero();renderTable();}},30000);
}
init();

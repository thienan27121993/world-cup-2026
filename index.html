<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0e1116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon.svg">
<title>World Cup 2026 — 日程・通知</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1116;
    --panel:#161a22;
    --panel2:#1c212c;
    --line:rgba(255,255,255,.055);
    --line2:rgba(255,255,255,.10);
    --txt:#e6e8ee;
    --muted:#7d8597;
    --muted2:#5b6373;
    --sand:#c9a96a;      /* refined gold/sand accent */
    --jp:#c8203f;        /* deep refined red */
    --jp-dim:rgba(200,32,63,.14);
    --feat:#b8924a;      /* muted ochre */
    --feat-dim:rgba(184,146,74,.12);
    --knock:#6fae9b;     /* muted sage */
    --knock-dim:rgba(111,174,155,.10);
    --live:#d9534f;
    --r:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--txt);
    font-family:'Zen Kaku Gothic New',system-ui,sans-serif;
    min-height:100vh;padding-bottom:40px;-webkit-font-smoothing:antialiased;
    font-size:15px;line-height:1.5;
  }
  .wrap{max-width:540px;margin:0 auto;padding:0 16px;}
  .mono{font-family:'DM Mono',monospace;}

  header{
    padding:max(18px,env(safe-area-inset-top)) 16px 12px;max-width:540px;margin:0 auto;
    position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg,var(--bg) 70%,rgba(14,17,22,.6) 90%,transparent);
    backdrop-filter:blur(8px);
  }
  .brandrow{display:flex;align-items:center;gap:11px;}
  .ball{width:34px;height:34px;border-radius:10px;flex:0 0 auto;background:var(--panel2);
    border:1px solid var(--line2);display:grid;place-items:center;}
  .ball span{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--sand);}
  .brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:19px;line-height:1;margin:0;letter-spacing:.2px;}
  .brand p{margin:3px 0 0;font-size:10px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;}
  .live-dot{margin-left:auto;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px;letter-spacing:.5px;}
  .live-dot i{width:7px;height:7px;border-radius:50%;background:var(--muted2);display:inline-block;}
  .live-dot.on i{background:var(--knock);box-shadow:0 0 0 0 rgba(111,174,155,.6);animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(111,174,155,.5)}70%{box-shadow:0 0 0 6px rgba(111,174,155,0)}100%{box-shadow:0 0 0 0 rgba(111,174,155,0)}}

  .hero{margin-top:13px;border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;background:var(--panel);position:relative;overflow:hidden;}
  .hero .edge{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--muted2);}
  .hero.jp .edge{background:var(--jp);}
  .hero.live .edge{background:var(--live);}
  .hero .tag{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;}
  .hero .tag .lv{color:#fff;background:var(--live);padding:1px 7px;border-radius:4px;font-weight:700;letter-spacing:.5px;}
  .hero .vs{font-family:'Fraunces',serif;font-weight:600;font-size:21px;line-height:1.15;margin:7px 0 3px;}
  .hero .score{font-family:'DM Mono',monospace;color:var(--sand);}
  .hero .meta{font-size:12px;color:var(--muted);}
  .cd{display:flex;gap:7px;margin-top:13px;}
  .cd div{flex:1;border:1px solid var(--line);border-radius:9px;padding:7px 2px;text-align:center;}
  .cd b{display:block;font-family:'DM Mono',monospace;font-size:18px;line-height:1;}
  .cd small{font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}

  .tabs{display:flex;gap:5px;margin:13px 0 2px;}
  .tab{flex:1;border:1px solid var(--line);cursor:pointer;font-family:inherit;font-weight:700;font-size:12.5px;
    color:var(--muted);background:transparent;padding:10px 4px;border-radius:10px;transition:.16s;}
  .tab.active{color:var(--bg);background:var(--sand);border-color:transparent;}

  .filterbar{display:flex;gap:7px;align-items:center;margin:14px 0 8px;flex-wrap:wrap;}
  .filterbar select{flex:1;min-width:130px;background:var(--panel);color:var(--txt);border:1px solid var(--line);
    border-radius:10px;padding:9px 11px;font-family:inherit;font-size:13px;}
  .chip{font-size:11.5px;padding:7px 11px;border-radius:999px;border:1px solid var(--line);background:transparent;
    color:var(--muted);cursor:pointer;font-weight:700;}
  .chip.on{background:var(--jp-dim);color:#f3a8b6;border-color:rgba(200,32,63,.4);}
  .chip.on.feat{background:var(--feat-dim);color:#dcc08a;border-color:rgba(184,146,74,.4);}

  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin:2px 2px 0;}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle;}

  .day{margin-top:17px;}
  .day-h{display:flex;align-items:baseline;gap:9px;margin:0 2px 8px;}
  .day-h b{font-family:'Fraunces',serif;font-weight:600;font-size:15px;}
  .day-h.today b{color:var(--knock);}
  .day-h .tb{background:var(--knock-dim);color:var(--knock);font-size:9px;padding:2px 7px;border-radius:5px;font-weight:700;letter-spacing:1px;border:1px solid rgba(111,174,155,.3);}

  .m{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px 13px;margin-bottom:8px;display:flex;align-items:stretch;gap:11px;overflow:hidden;}
  .m .accent{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--muted2);}
  .m.feat{border-color:rgba(184,146,74,.28);}.m.feat .accent{background:var(--feat);}
  .m.jp{background:linear-gradient(100deg,var(--jp-dim),var(--panel) 55%);border-color:rgba(200,32,63,.32);}.m.jp .accent{background:var(--jp);}
  .m.knock{border-color:rgba(111,174,155,.26);}.m.knock .accent{background:var(--knock);}
  .m.done{opacity:.46;}
  .m.livegame{border-color:rgba(217,83,79,.5);}.m.livegame .accent{background:var(--live);}
  .m .time{flex:0 0 50px;text-align:center;display:flex;flex-direction:column;justify-content:center;gap:2px;}
  .m .time b{font-family:'DM Mono',monospace;font-size:16px;line-height:1;}
  .m .time small{font-size:8.5px;color:var(--muted);letter-spacing:1px;}
  .m .body{flex:1;min-width:0;}
  .m .teams{font-weight:700;font-size:14.5px;line-height:1.35;}
  .m .teams .sc{font-family:'DM Mono',monospace;color:var(--sand);margin:0 2px;}
  .m .vs{color:var(--muted);font-weight:400;margin:0 3px;}
  .m .sub{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .badge{font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.3px;border:1px solid transparent;}
  .b-jp{background:var(--jp-dim);color:#f3a8b6;border-color:rgba(200,32,63,.35);}
  .b-feat{background:var(--feat-dim);color:#dcc08a;border-color:rgba(184,146,74,.35);}
  .b-grp{background:var(--panel2);color:var(--muted);}
  .b-live{background:var(--live);color:#fff;}
  .m .actions{flex:0 0 auto;display:flex;flex-direction:column;gap:6px;justify-content:center;}
  .iconbtn{width:36px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);
    color:var(--txt);display:grid;place-items:center;cursor:pointer;font-size:14px;transition:.15s;}
  .iconbtn.on{background:var(--sand);color:var(--bg);border-color:transparent;}
  .iconbtn.watch{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.5px;color:var(--knock);}

  /* standings */
  .grpcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:11px;}
  .grpcard h4{margin:0 0 8px;font-family:'Fraunces',serif;font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;}
  .grpcard h4 .gl{background:var(--panel2);color:var(--sand);font-size:10px;padding:2px 7px;border-radius:5px;font-family:'DM Mono';}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{font-size:9px;color:var(--muted);font-weight:700;text-align:center;padding:4px 2px;letter-spacing:.5px;text-transform:uppercase;}
  th:first-child,td:first-child{text-align:left;}
  td{padding:7px 2px;text-align:center;border-top:1px solid var(--line);}
  td.tm{font-weight:500;}
  td.tm .fl{margin-right:5px;}
  tr.jp td{color:#f3a8b6;}
  tr.qual td:first-child{box-shadow:inset 3px 0 0 var(--knock);}
  td.pts{font-family:'DM Mono',monospace;font-weight:700;color:var(--sand);}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px;margin-top:13px;}
  .card h3{margin:0 0 4px;font-family:'Fraunces',serif;font-weight:600;font-size:15px;}
  .row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .row .lab{font-size:13.5px;font-weight:500;}.row .desc{font-size:11px;color:var(--muted);margin-top:2px;}
  .toggle{width:44px;height:26px;border-radius:999px;background:var(--panel2);border:1px solid var(--line2);position:relative;cursor:pointer;flex:0 0 auto;transition:.2s;}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#cfd4df;transition:.2s;}
  .toggle.on{background:var(--knock);border-color:transparent;}.toggle.on::after{left:20px;background:#fff;}
  select.mini,input.mini{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-family:inherit;font-size:12px;}
  input.mini{width:100%;}
  .btn{display:block;width:100%;text-align:center;padding:12px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:13.5px;margin-top:11px;}
  .btn-primary{background:var(--sand);color:var(--bg);}
  .btn-ghost{background:transparent;color:var(--txt);border:1px solid var(--line2);}
  .note{font-size:11px;color:var(--muted);line-height:1.65;margin-top:9px;}
  .note code{font-family:'DM Mono';background:var(--panel2);padding:1px 5px;border-radius:4px;color:var(--sand);font-size:10.5px;}
  .stat{font-size:11px;color:var(--muted);}.stat b{color:var(--txt);}

  .sheet-bg{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.55);display:none;align-items:flex-end;}
  .sheet-bg.show{display:flex;}
  .sheet{background:var(--panel);width:100%;max-width:540px;margin:0 auto;border-radius:18px 18px 0 0;padding:18px 18px max(20px,env(safe-area-inset-bottom));border:1px solid var(--line);border-bottom:none;}
  .sheet h4{margin:0 0 3px;font-family:'Fraunces',serif;font-weight:600;font-size:17px;}
  .sheet .sm{font-size:12px;color:var(--muted);margin-bottom:13px;}
  .wlink{display:flex;align-items:center;gap:11px;padding:12px 13px;border-radius:11px;background:var(--panel2);border:1px solid var(--line);margin-bottom:8px;text-decoration:none;color:var(--txt);}
  .wlink .ic{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-weight:700;font-size:12px;flex:0 0 auto;font-family:'DM Mono';}
  .wlink b{font-size:13.5px;}.wlink small{display:block;font-size:11px;color:var(--muted);}
  .free{margin-left:auto;background:var(--knock-dim);color:var(--knock);font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;border:1px solid rgba(111,174,155,.3);}

  .empty{text-align:center;color:var(--muted);padding:38px 10px;font-size:13px;}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(80px);background:var(--panel2);border:1px solid var(--line2);color:var(--txt);padding:11px 17px;border-radius:11px;font-size:13px;z-index:80;transition:.3s;max-width:90%;text-align:center;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>

</div>

/* ===================== ユーティリティ ===================== */
const now=()=>new Date();
const dt=m=>new Date(m.iso);
const WD=["日","月","火","水","木","金","土"];
const dayKey=m=>{const d=dt(m);return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();};
const dLabel=d=>`${d.getMonth()+1}月${d.getDate()}日 (${WD[d.getDay()]})`;
function fmtTime(m){if(m.tbd)return"未定";const d=dt(m);return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function res(m){return RESULTS[m.id]||null;}
function status(m){const r=res(m);if(r&&r.status)return r.status;const s=dt(m).getTime(),t=now().getTime();if(t<s)return"NS";if(t<s+2.2*3600*1e3)return"LIVE";return"FT";}
const isLive=m=>status(m)==="LIVE";
const isDone=m=>status(m)==="FT";
const grpLabel=g=>({R32:"ベスト32",R16:"ベスト16",QF:"準々決勝",SF:"準決勝","3位":"3位決定戦","決勝":"決勝"})[g]||("グループ"+g);
function teamsList(){const s=new Set();MATCHES.forEach(m=>{if(!m.knock){s.add(m.h);s.add(m.a);}});return[...s].sort();}

/* ===================== 順位表計算 ===================== */
function standings(){
  const groups={};
  MATCHES.filter(m=>!m.knock).forEach(m=>{
    const g=m.grp;(groups[g]=groups[g]||{});
    [m.h,m.a].forEach(t=>groups[g][t]=groups[g][t]||{t,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});
    const r=res(m); if(r&&r.status==="FT"&&r.sh!=null&&r.sa!=null){
      const H=groups[g][m.h],A=groups[g][m.a];
      H.p++;A.p++;H.gf+=r.sh;H.ga+=r.sa;A.gf+=r.sa;A.ga+=r.sh;
      if(r.sh>r.sa){H.w++;A.l++;H.pts+=3;}else if(r.sh<r.sa){A.w++;H.l++;A.pts+=3;}else{H.d++;A.d++;H.pts++;A.pts++;}
    }
  });
  const out={};
  Object.keys(groups).sort().forEach(g=>{
    out[g]=Object.values(groups[g]).map(x=>({...x,gd:x.gf-x.ga}))
      .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.t.localeCompare(b.t,'ja'));
  });
  return out;
}

async function ensurePerm(){
  if(!("Notification"in window)){toast("この端末は通知に未対応です");return false;}
  if(Notification.permission==="granted")return true;
  if(Notification.permission==="denied"){toast("通知がブロックされています。端末設定で許可を");return false;}
  return (await Notification.requestPermission())==="granted";
}
async function clearScheduled(){
  Object.values(timers).forEach(clearTimeout);timers={};
  if(swReg){try{const ns=await swReg.getNotifications({includeTriggered:true});ns.forEach(n=>{if(n.tag&&n.tag.startsWith("wc26-"))n.close();});}catch(_){}}
}
async function scheduleAll(){
  await clearScheduled();
  if(!opts.enabled)return;
  const trig=swReg&&('showTrigger'in Notification.prototype);
  const lead=opts.lead*6e4;
  for(const id of notifSet){
    const m=byId(id);if(!m||m.tbd)continue;
    const when=dt(m).getTime()-lead;if(when<=Date.now())continue;
    const title=`${m.fh}${m.h} vs ${m.fa}${m.a}`;
    const body=`まもなくキックオフ ${fmtTime(m)} JST ・ ${m.city}`;
    if(trig){
      try{await swReg.showNotification(title,{body,tag:"wc26-"+id,icon:"./icon.svg",badge:"./icon.svg",showTrigger:new TimestampTrigger(when)});}catch(_){}
    }else{
      const delay=when-Date.now();if(delay<2147483647)timers[id]=setTimeout(()=>{if(Notification.permission==="granted")new Notification(title,{body,tag:"wc26-"+id});},delay);
    }
  }
}
async function toggleNotif(id){
  const m=byId(id);
  if(notifSet.has(id)){notifSet.delete(id);toast("通知をオフにしました");}
  else{if(!(await ensurePerm()))return;notifSet.add(id);opts.enabled=true;toast(`🔔 ${m.h} 戦の通知をオン`);}
  save();await scheduleAll();render();
}
function applyAuto(){
  if(opts.jpAuto)MATCHES.filter(m=>m.jp).forEach(m=>notifSet.add(m.id));
  if(opts.featAuto)MATCHES.filter(m=>m.feat&&!m.tbd).forEach(m=>notifSet.add(m.id));
  save();
}

/* ===================== 中継シート ===================== */
const sheet=document.getElementById("watchSheet");
function openWatch(id){const m=byId(id);document.getElementById("wsTitle").textContent=`${m.h} vs ${m.a}`;
  document.getElementById("wsSub").textContent=`${dLabel(dt(m))} ${fmtTime(m)} JST ・ ${m.city}`;
  const links=m.jp?STREAMS.jp:STREAMS.all;
  document.getElementById("wsLinks").innerHTML=links.map(s=>`<a class="wlink" href="${s.u}" target="_blank" rel="noopener">
    <div class="ic" style="background:${s.bg};color:${s.c}">${s.n.slice(0,2)}</div>
    <div><b>${s.n}</b><small>${s.d}</small></div>${s.free?'<span class="free">無料</span>':''}</a>`).join("");
  sheet.classList.add("show");}
function closeWatch(){sheet.classList.remove("show");}
sheet.addEventListener("click",e=>{if(e.target===sheet)closeWatch();});

/* ===================== バインド ===================== */
function bind(){
  const ts=document.getElementById("teamSel");if(ts)ts.onchange=e=>{favTeam=e.target.value;save();render();};
  const cj=document.getElementById("cJP");if(cj)cj.onclick=()=>{onlyJP=!onlyJP;onlyFeat=false;render();};
  const cf=document.getElementById("cFeat");if(cf)cf.onclick=()=>{onlyFeat=!onlyFeat;onlyJP=false;render();};
}
function bindSettings(){
  document.getElementById("tgEn").onclick=async()=>{if(!opts.enabled&&!(await ensurePerm()))return;opts.enabled=!opts.enabled;save();await scheduleAll();renderSettings();toast(opts.enabled?"通知を有効化":"通知を無効化");};
  document.getElementById("lead").onchange=e=>{opts.lead=+e.target.value;save();scheduleAll();toast("タイミングを更新");};
  document.getElementById("tgJP").onclick=()=>{opts.jpAuto=!opts.jpAuto;if(opts.jpAuto)applyAuto();save();scheduleAll();renderSettings();};
  document.getElementById("tgFt").onclick=()=>{opts.featAuto=!opts.featAuto;if(opts.featAuto)applyAuto();save();scheduleAll();renderSettings();};
  document.getElementById("tgDemo").onclick=async()=>{opts.demo=!opts.demo;save();await syncLive();renderSettings();render();};
  document.getElementById("apiBase").onchange=e=>{opts.apiBase=e.target.value.trim();save();};
  document.getElementById("saveApi").onclick=async()=>{opts.apiBase=document.getElementById("apiBase").value.trim();save();await syncLive();renderSettings();render();toast(liveOK?"同期しました":"接続できませんでした");};
  document.getElementById("fav").onchange=e=>{favTeam=e.target.value;save();};
  document.getElementById("testN").onclick=async()=>{if(!(await ensurePerm()))return;
    if(swReg)swReg.showNotification("⚽ World Cup 2026",{body:"テスト通知です。試合前にこのお知らせが届きます。",icon:"./icon.svg"});
    else new Notification("⚽ World Cup 2026",{body:"テスト通知です。"});toast("テスト通知を送信");};
}

/* ===================== タブ ===================== */
document.querySelectorAll(".tab").forEach(b=>{b.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));b.classList.add("active");current=b.dataset.tab;onlyJP=onlyFeat=false;render();window.scrollTo({top:0,behavior:"smooth"});};});

/* ===================== トースト ===================== */
let tT=null;function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(tT);tT=setTimeout(()=>t.classList.remove("show"),2400);}

/* ===================== 起動 ===================== */
async function init(){
  if("serviceWorker"in navigator&&location.protocol!=="file:"){
    try{swReg=await navigator.serviceWorker.register("./sw.js");await navigator.serviceWorker.ready;}catch(_){}
  }
  if(opts.jpAuto||opts.featAuto)applyAuto();
  await syncLive();
  if(opts.enabled&&("Notification"in window)&&Notification.permission==="granted")await scheduleAll();
  render();
  // 30秒ごと：次の試合の繰り上げ・LIVE切替・ライブ同期
  setInterval(async()=>{if(liveOK||opts.apiBase||opts.demo)await syncLive();renderHero();if(current!=="set")render();},30000);
}
init();
</script>
</body>
